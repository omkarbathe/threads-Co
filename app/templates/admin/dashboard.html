{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="mb-10">
        <h1 class="text-3xl font-light tracking-tight text-gray-900 uppercase">Admin Dashboard</h1>
        <p class="text-sm text-gray-500 mt-2">Overview of Threads & Co. operations.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
        <div class="border border-gray-100 p-8 rounded-sm bg-white shadow-sm">
            <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Total Catalog</p>
            <p class="text-4xl font-light mt-2">{{ product_count }} Products</p>
        </div>
        <div class="border border-gray-100 p-8 rounded-sm bg-white shadow-sm">
            <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Active Orders</p>
            <p class="text-4xl font-light mt-2">{{ order_count }}</p>
        </div>
        <div class="border border-gray-100 p-8 rounded-sm bg-black text-white shadow-sm">
            <p class="text-[10px] font-bold uppercase tracking-widest text-gray-300">Revenue (INR)</p>
            <p class="text-4xl font-light mt-2">₹{{ "{:,}".format(total_revenue or 0) }}</p>
        </div>
    </div>

    <div class="flex gap-4">
        <a href="{{ url_for('admin.add_product') }}" class="bg-black text-white px-6 py-3 text-xs font-bold uppercase tracking-widest hover:bg-gray-800 transition-all">
            Add New Product
        </a>
        <a href="{{ url_for('admin.manage_products') }}" class="border border-black text-black px-6 py-3 text-xs font-bold uppercase tracking-widest hover:bg-gray-50 transition-all">
            Manage Inventory
        </a>
    </div>
</div>
{% endblock %}
